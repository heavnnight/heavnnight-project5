<!DOCTYPE html>
<html>
<head>
  <title>Ghibli Mood Finder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔥 اختبار الصورة (مؤقت) -->
  <img src="hero.png" width="200">

  <!-- 🔥 Hero -->
  <div class="hero">
    <div class="hero-overlay">

      <h1>Ghibli Mood Finder</h1>

      <p>
        Tell me what you feel, and I’ll find you a world to escape into.
      </p>

      <div class="search-box">
        <input id="input" placeholder="I want something magical, sad, comforting..." />
        <button onclick="run()">Find My Film</button>
      </div>

    </div>
  </div>

  <div id="result"></div>

  <script src="script.js"></script>

</body>
</html>
